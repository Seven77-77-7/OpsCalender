<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>XPIN市场运营日历</title>
    <link rel="stylesheet" href="./styles.css?v=10" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="kicker">XPIN OPERATION CALENDAR</p>
        <h1>XPIN市场运营日历</h1>
      </div>
      <div class="status" id="dataStatus">正在读取日历数据</div>
    </header>

    <main class="workspace">
      <section class="main-grid">
        <div class="calendar-panel">
          <div class="panel-head">
            <div>
              <p class="kicker">CALENDAR</p>
              <h2 id="calendarTitle">运营日历</h2>
            </div>
            <div class="month-nav" aria-label="月份切换">
              <button id="prevMonth" type="button">上个月</button>
              <button id="nextMonth" type="button">下个月</button>
            </div>
          </div>
          <div class="calendar" id="calendar"></div>
        </div>

        <aside class="detail-panel">
          <div class="panel-head compact">
            <div>
              <p class="kicker">SELECTED DATE</p>
              <h2 id="selectedDateTitle">选择一个日期</h2>
            </div>
          </div>
          <div class="event-list" id="eventList"></div>
        </aside>
      </section>

    </main>

    <script src="./data.js?v=10" defer></script>
    <script src="./sync-config.js?v=10" defer></script>
    <script src="./app.js?v=10" defer></script>
  </body>
</html>
